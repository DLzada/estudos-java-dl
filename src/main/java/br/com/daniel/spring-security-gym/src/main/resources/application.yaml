spring:
  application:
    name: spring-data-jpa-simple
  data-source:
    url: jdbc:mysql://localhost:3307/gym_spring?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true